services:
  - type: web
    name: kanban-backend
    env: php
    plan: free
    buildCommand: cd backend && composer install && php artisan migrate --force && php artisan config:cache && php artisan route:cache
    startCommand: cd backend && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
